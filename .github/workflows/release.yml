name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string
      draft:
        description: Create the release as a draft
        required: false
        default: false
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

jobs:
  package_posix:
    name: package-${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            runner: ubuntu-latest
          - id: macos
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Build, validate, and package
        shell: bash
        run: bash ./scripts/validate_v1.sh --build-dir build --config Release --jobs 1

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: true
          path: |
            .p6_validation_dist/*.tar.gz
            .p6_validation_dist/*.tgz
            .p6_validation_dist/*.zip

  package_windows:
    name: package-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Build, validate, and package
        shell: pwsh
        run: pwsh ./scripts/validate_v1.ps1 -BuildDir build -Config Release -Jobs 1

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: true
          path: |
            .p6_validation_dist/*.tar.gz
            .p6_validation_dist/*.tgz
            .p6_validation_dist/*.zip

  publish_release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - package_posix
      - package_windows
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*

      - name: Show packaged artifacts
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -maxdepth 2 -type f | sort

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if [[ -z "$tag" ]]; then
            echo "release tag is empty" >&2
            exit 1
          fi

          target_commit=$(git rev-parse HEAD)
          echo "Using release ref $CHECKOUT_REF at commit $target_commit"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; assets will be replaced where names match."
          else
            args=("$tag" --title "$tag" --target "$target_commit" --generate-notes)
            if [[ "$DRAFT" == "true" ]]; then
              args+=(--draft)
            fi
            if [[ "$PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t files < <(find release-assets -type f \( -name 'ai_bridge-*.tar.gz' -o -name 'ai_bridge-*.tgz' -o -name 'ai_bridge-*.zip' \) | sort)
          if (( ${#files[@]} == 0 )); then
            echo "No packaged release artifacts found" >&2
            exit 1
          fi

          declare -A seen=()
          declare -A keep=()
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            if [[ -n "${seen[$name]:-}" ]]; then
              echo "Duplicate release asset filename detected: $name" >&2
              echo "Each uploaded asset must have a unique basename." >&2
              exit 1
            fi
            seen["$name"]=1
            keep["$name"]=1
          done

          mapfile -t existing < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for name in "${existing[@]}"; do
            if [[ -z "${keep[$name]:-}" ]]; then
              gh release delete-asset "$RELEASE_TAG" "$name" --yes >/dev/null 2>&1 || true
            fi
          done

          for file in "${files[@]}"; do
            name="$(basename "$file")"
            gh release delete-asset "$RELEASE_TAG" "$name" --yes >/dev/null 2>&1 || true
            gh release upload "$RELEASE_TAG" "$file"
          done
